<head>
<meta charset="UTF-8" />

<title>MagicBee - Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; }

  #header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(13,17,23,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid #30363d; padding: 10px 18px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  #header h1 { font-size: 15px; font-weight: 700; color: #f0b429; white-space: nowrap; }
  #search { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 5px 10px; border-radius: 6px; font-size: 13px; width: 200px; outline: none; }
  #search:focus { border-color: #f0b429; }
  .filter-btn { background: #161b22; border: 1px solid #30363d; color: #8b949e; padding: 4px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all .15s; }
  .filter-btn:hover, .filter-btn.active { color: #fff; border-color: currentColor; }
  .filter-btn.f-page   { --c: #58a6ff; }
  .filter-btn.f-api    { --c: #f85149; }
  .filter-btn.f-comp   { --c: #3fb950; }
  .filter-btn.f-lib    { --c: #bc8cff; }
  .filter-btn.f-table  { --c: #ffa657; }
  .filter-btn.f-ext    { --c: #79c0ff; }
  .filter-btn.active   { background: color-mix(in srgb, var(--c) 15%, transparent); border-color: var(--c); color: var(--c); }

  #canvas { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }

  .node circle { stroke-width: 2; cursor: pointer; transition: r .1s; }
  .node text { font-size: 10px; fill: #c9d1d9; pointer-events: none; text-shadow: 0 0 4px #0d1117, 0 0 4px #0d1117; }
  .node:hover circle { stroke-width: 3; }

  .link { stroke-opacity: 0.35; }

  #tooltip { position: fixed; background: rgba(13,17,23,0.97); border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none; max-width: 280px; z-index: 200; display: none; }
  #tooltip .tt-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
  #tooltip .tt-cat { font-size: 11px; margin-bottom: 8px; opacity: .7; }
  #tooltip .tt-row { margin: 3px 0; line-height: 1.4; }
  #tooltip .tt-label { color: #8b949e; }

  #legend { position: fixed; bottom: 14px; left: 14px; background: rgba(13,17,23,0.9); border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 12px; z-index: 100; }
  #legend h3 { font-size: 11px; color: #8b949e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
  .legend-item { display: flex; align-items: center; gap: 7px; margin: 5px 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  #info { position: fixed; bottom: 14px; right: 14px; background: rgba(13,17,23,0.9); border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #8b949e; z-index: 100; line-height: 1.8; }

  #stats { position: fixed; top: 62px; right: 14px; background: rgba(13,17,23,0.9); border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 11px; z-index: 100; }
  #stats div { color: #8b949e; margin: 2px 0; }
  #stats span { color: #e6edf3; font-weight: 600; }
</style>
</head>

<div id="header">

<div id="tooltip"></div>

  { s:'lib-supa-server',   t:'ext-supabase',    type:'calls' },

  { s:'lib-whatsapp',      t:'ext-meta',        type:'calls' },

  { s:'lib-bot',           t:'ext-anthropic',   type:'calls' },
  { s:'lib-bot',           t:'lib-whatsapp',    type:'uses' },
  { s:'lib-bot',           t:'lib-emails',      type:'uses' },
  { s:'lib-bot',           t:'t-organizations', type:'reads' },
  { s:'lib-bot',           t:'t-services',      type:'reads' },
  { s:'lib-bot',           t:'t-schedules',     type:'reads' },
  { s:'lib-bot',           t:'t-staff',         type:'reads' },
  { s:'lib-bot',           t:'t-clients',       type:'writes' },
  { s:'lib-bot',           t:'t-appointments',  type:'writes' },
  { s:'lib-bot',           t:'t-sessions',      type:'writes' },

  { s:'lib-promotions',    t:'t-clients',       type:'reads' },
  { s:'lib-promotions',    t:'t-appointments',  type:'reads' },

  { s:'lib-emails',        t:'ext-resend',      type:'calls' },
  { s:'lib-emails',        t:'t-appointments',  type:'reads' },
  { s:'lib-emails',        t:'t-organizations', type:'reads' },
  { s:'lib-emails',        t:'t-clients',       type:'reads' },

  { s:'lib-utils',         t:'lib-supa-client', type:'used-by' },
  { s:'comp-button',       t:'lib-utils',       type:'uses' },
];

// ── GRAPH ──────────────────────────────────────────────────────────────────
const linkColor = { uses:'#58a6ff', calls:'#f85149', reads:'#3fb950', writes:'#ffa657', renders:'#bc8cff', 'used-by':'#79c0ff' };
const LINK_OPACITY = 0.4;

let activeCategories = new Set(['page','api','component','lib','table','external']);
let searchTerm = '';

const W = window.innerWidth, H = window.innerHeight - 52;

const svg = d3.select('#canvas').append('svg')
  .attr('width', W).attr('height', H);

const g = svg.append('g');

svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform)));

let simulation, linkSel, nodeSel;

function buildGraph() {
  const visNodes = nodes.filter(n => activeCategories.has(n.cat) &&
    (!searchTerm || n.label.toLowerCase().includes(searchTerm) || n.desc.toLowerCase().includes(searchTerm)));
  const visIds = new Set(visNodes.map(n => n.id));
  const visLinks = links
    .filter(l => visIds.has(l.s) && visIds.has(l.t))
    .map(l => ({ ...l, source: l.s, target: l.t }));

  document.getElementById('s-nodes').textContent = visNodes.length;
  document.getElementById('s-links').textContent = visLinks.length;

  g.selectAll('*').remove();

  if (simulation) simulation.stop();

  simulation = d3.forceSimulation(visNodes)
    .force('link', d3.forceLink(visLinks).id(d => d.id).distance(90).strength(0.5))
    .force('charge', d3.forceManyBody().strength(-280))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(18))
    .alphaDecay(0.015);

  linkSel = g.append('g').selectAll('line').data(visLinks).join('line')
    .attr('class', 'link')
    .attr('stroke', d => linkColor[d.type] || '#555')
    .attr('stroke-width', 1.4)
    .attr('stroke-opacity', LINK_OPACITY);

  nodeSel = g.append('g').selectAll('g').data(visNodes).join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); })
    )
    .on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout',  hideTooltip)
    .on('click', (e, d) => { if (d.fx) { d.fx = null; d.fy = null; } else { d.fx = d.x; d.fy = d.y; } });

  nodeSel.append('circle')
    .attr('r', d => SIZES[d.cat] || 8)
    .attr('fill', d => COLORS[d.cat])
    .attr('stroke', d => d3.color(COLORS[d.cat]).brighter(1).formatHex())
    .attr('fill-opacity', 0.85);

  nodeSel.append('text')
    .attr('x', d => (SIZES[d.cat] || 8) + 3)
    .attr('y', 4)
    .text(d => d.label);

  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// ── TOOLTIP ────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(e, d) {
  const connectedLinks = links.filter(l => l.s === d.id || l.t === d.id);
  const out = connectedLinks.filter(l => l.s === d.id);
  const ins = connectedLinks.filter(l => l.t === d.id);

  let html = `<div class="tt-title" style="color:${COLORS[d.cat]}">${d.label}</div>`;
  html += `<div class="tt-cat">${{ page:'Page / Ruta', api:'API Route', component:'Componente', lib:'Librería', table:'Tabla Supabase', external:'Servicio Externo' }[d.cat]}</div>`;
  html += `<div class="tt-row">${d.desc}</div>`;
  if (out.length) html += `<div class="tt-row" style="margin-top:8px"><span class="tt-label">Usa → </span>${out.map(l=>l.t).slice(0,5).join(', ')}</div>`;
  if (ins.length) html += `<div class="tt-row"><span class="tt-label">Usado por → </span>${ins.map(l=>l.s).slice(0,5).join(', ')}</div>`;

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ── CONTROLS ───────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if (activeCategories.has(cat)) activeCategories.delete(cat);
    else activeCategories.add(cat);
    btn.classList.toggle('active');
    buildGraph();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  buildGraph();
});

window.addEventListener('resize', () => {
  svg.attr('width', window.innerWidth).attr('height', window.innerHeight - 52);
});

buildGraph();
</script>
</body>
</html>
